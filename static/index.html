<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>川时的音乐工坊</title>
    <script src="https://cdn.jsdelivr.net/npm/wavesurfer.js@6/dist/wavesurfer.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "思源黑体", sans-serif;
        }
        body {
            background: #121212;
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
        }
        .app-container {
            display: flex;
            height: 100vh;
            width: 100%;
        }
        /* 左侧侧边栏 */
        .sidebar {
            width: 240px;
            background: #1e1e1e;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 20px 15px;
            border-bottom: 1px solid #333;
        }
        .project-title {
            font-size: 20px;
            font-weight: 700;
            color: #61afef;
            text-align: center;
        }
        .menu-list {
            flex: 1;
            padding: 20px 0;
        }
        .menu-item {
            padding: 12px 20px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 3px solid transparent;
        }
        .menu-item:hover {
            background: #2a2a2a;
        }
        .menu-item.active {
            background: #252526;
            border-left: 3px solid #61afef;
            color: #61afef;
        }
        /* 右侧主窗口 */
        .main-window {
            flex: 1;
            background: #121212;
            overflow-y: auto;
            padding: 30px;
        }
        .panel {
            display: none;
        }
        .panel.active {
            display: block;
        }
        .panel-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 25px;
            color: #e0e0e0;
        }
        .card {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 20px;
        }
        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #dcdcdc;
        }
        .file-upload {
            border: 2px dashed #333;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 15px;
        }
        .file-upload:hover {
            border-color: #61afef;
        }
        .file-upload input {
            display: none;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary {
            background: #61afef;
            color: #121212;
        }
        .btn-primary:hover {
            background: #4895d9;
        }
        .btn-primary:disabled {
            background: #3a3a3a;
            color: #666;
            cursor: not-allowed;
        }
        .btn-success {
            background: #98c379;
            color: #121212;
        }
        .btn-success:hover {
            background: #7faa60;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        .waveform-box {
            background: #252526;
            border-radius: 6px;
            padding: 15px;
            margin: 15px 0;
        }
        .status-tip {
            padding: 10px 15px;
            border-radius: 6px;
            margin: 15px 0;
            text-align: center;
        }
        .status-info {
            background: #1e3a5f;
            color: #61afef;
        }
        .status-success {
            background: #2a3f21;
            color: #98c379;
        }
        .status-error {
            background: #3f2123;
            color: #e06c75;
        }
        .two-column {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .three-column {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
        }
        .project-item {
            padding: 15px;
            border: 1px solid #333;
            border-radius: 8px;
            margin-bottom: 10px;
            background: #1e1e1e;
        }
        .project-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .project-type {
            font-weight: 600;
            color: #61afef;
        }
        .project-time {
            color: #999;
            font-size: 14px;
        }
        .project-files {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .file-link {
            padding: 5px 10px;
            background: #252526;
            border-radius: 4px;
            color: #98c379;
            text-decoration: none;
            font-size: 14px;
        }
        .file-link:hover {
            background: #333;
        }
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e1e1e;
        }
        ::-webkit-scrollbar-thumb {
            background: #3a3a3a;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 左侧侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="project-title">川时的音乐工坊</div>
            </div>
            <div class="menu-list">
                <div class="menu-item active" data-panel="split">
                    <span>🎵</span>
                    <span>歌曲拆分</span>
                </div>
                <div class="menu-item" data-panel="mix">
                    <span>🎛️</span>
                    <span>AI混音</span>
                </div>
                <div class="menu-item" data-panel="projects">
                    <span>📁</span>
                    <span>工程记录</span>
                </div>
            </div>
        </div>

        <!-- 右侧主窗口 -->
        <div class="main-window">
            <!-- 歌曲拆分面板 -->
            <div class="panel active" id="split-panel">
                <h2 class="panel-title">歌曲拆分</h2>
                <div class="card">
                    <div class="card-title">上传原版歌曲</div>
                    <div class="file-upload">
                        <label for="split-song">
                            <div>点击选择歌曲文件 | 支持 mp3/wav/m4a/flac</div>
                        </label>
                        <input type="file" id="split-song" accept="audio/*">
                    </div>
                    <div id="split-file-name" style="color: #999; margin-bottom: 15px;"></div>
                    <button class="btn btn-primary" id="split-btn" disabled>一键拆分伴奏与人声</button>
                    <div id="split-status"></div>
                </div>

                <div class="two-column" id="split-result" style="display: none;">
                    <div class="card">
                        <div class="card-title">纯伴奏</div>
                        <div class="waveform-box"><div id="split-acc-wave"></div></div>
                        <div class="btn-group">
                            <button class="btn btn-primary" id="acc-play-btn">播放</button>
                            <button class="btn btn-primary" id="acc-pause-btn">暂停</button>
                            <a class="btn btn-success" id="acc-download-btn" href="" download>下载</a>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-title">原唱人声</div>
                        <div class="waveform-box"><div id="split-vocal-wave"></div></div>
                        <div class="btn-group">
                            <button class="btn btn-primary" id="vocal-play-btn">播放</button>
                            <button class="btn btn-primary" id="vocal-pause-btn">暂停</button>
                            <a class="btn btn-success" id="vocal-download-btn" href="" download>下载</a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- AI混音面板 -->
            <div class="panel" id="mix-panel">
                <h2 class="panel-title">AI混音（原曲学习）</h2>
                <div class="three-column">
                    <div class="card">
                        <div class="card-title">1. 原版歌曲</div>
                        <div class="file-upload">
                            <label for="mix-original">
                                <div>点击上传原唱歌曲</div>
                            </label>
                            <input type="file" id="mix-original" accept="audio/*">
                        </div>
                        <div id="mix-original-name" style="color: #999;"></div>
                    </div>
                    <div class="card">
                        <div class="card-title">2. 伴奏文件</div>
                        <div class="file-upload">
                            <label for="mix-acc">
                                <div>点击上传伴奏</div>
                            </label>
                            <input type="file" id="mix-acc" accept="audio/*">
                        </div>
                        <div id="mix-acc-name" style="color: #999;"></div>
                    </div>
                    <div class="card">
                        <div class="card-title">3. 人声干声</div>
                        <div class="file-upload">
                            <label for="mix-vocal">
                                <div>点击上传人声干声</div>
                            </label>
                            <input type="file" id="mix-vocal" accept="audio/*">
                        </div>
                        <div id="mix-vocal-name" style="color: #999;"></div>
                    </div>
                </div>

                <div class="card">
                    <button class="btn btn-success" id="mix-btn" disabled style="width: 100%; font-size: 18px; padding: 15px;">开始AI混音（学习原曲风格）</button>
                    <div id="mix-status"></div>
                </div>

                <div class="card" id="mix-result" style="display: none;">
                    <div class="card-title">混音成品</div>
                    <div class="waveform-box"><div id="mix-result-wave"></div></div>
                    <div class="btn-group">
                        <button class="btn btn-primary" id="result-play-btn">播放</button>
                        <button class="btn btn-primary" id="result-pause-btn">暂停</button>
                        <a class="btn btn-success" id="result-download-btn" href="" download>下载成品</a>
                    </div>
                </div>
            </div>

            <!-- 工程记录面板 -->
            <div class="panel" id="projects-panel">
                <h2 class="panel-title">工程记录</h2>
                <button class="btn btn-primary" id="refresh-projects-btn">刷新工程列表</button>
                <div id="projects-list" style="margin-top: 20px;"></div>
            </div>
        </div>
    </div>

    <script>
        let currentPanel = "split";
        // 波形播放器
        const splitAccWave = WaveSurfer.create({ container: '#split-acc-wave', waveColor: '#61afef', progressColor: '#4895d9', height: 80, barWidth: 2 });
        const splitVocalWave = WaveSurfer.create({ container: '#split-vocal-wave', waveColor: '#98c379', progressColor: '#7faa60', height: 80, barWidth: 2 });
        const mixResultWave = WaveSurfer.create({ container: '#mix-result-wave', waveColor: '#c678dd', progressColor: '#a95dc0', height: 80, barWidth: 2 });

        // 菜单切换
        document.querySelectorAll('.menu-item').forEach(item => {
            item.addEventListener('click', () => {
                const panel = item.dataset.panel;
                document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                document.getElementById(`${panel}-panel`).classList.add('active');
                currentPanel = panel;
                if (panel === "projects") loadProjects();
            });
        });

        // ====================== 歌曲拆分逻辑 ======================
        const splitSongInput = document.getElementById('split-song');
        const splitBtn = document.getElementById('split-btn');
        const splitFileName = document.getElementById('split-file-name');
        const splitStatus = document.getElementById('split-status');
        const splitResult = document.getElementById('split-result');

        splitSongInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            splitFileName.textContent = file ? `已选择: ${file.name}` : '';
            splitBtn.disabled = !file;
        });

        splitBtn.addEventListener('click', async () => {
            const file = splitSongInput.files[0];
            if (!file) return;
            splitBtn.disabled = true;
            splitStatus.innerHTML = '<div class="status-tip status-info">正在拆分，请稍候...</div>';
            
            const formData = new FormData();
            formData.append('original_song', file);
            
            try {
                const res = await fetch('/api/split', { method: 'POST', body: formData });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail);

                splitAccWave.load(`/api/download/${data.acc_file}`);
                splitVocalWave.load(`/api/download/${data.vocal_file}`);
                document.getElementById('acc-download-btn').href = `/api/download/${data.acc_file}`;
                document.getElementById('vocal-download-btn').href = `/api/download/${data.vocal_file}`;
                splitResult.style.display = 'grid';
                splitStatus.innerHTML = '<div class="status-tip status-success">✅ 拆分成功！</div>';
            } catch (e) {
                splitStatus.innerHTML = `<div class="status-tip status-error">❌ 出错了：${e.message}</div>`;
            } finally {
                splitBtn.disabled = false;
            }
        });

        document.getElementById('acc-play-btn').addEventListener('click', () => splitAccWave.play());
        document.getElementById('acc-pause-btn').addEventListener('click', () => splitAccWave.pause());
        document.getElementById('vocal-play-btn').addEventListener('click', () => splitVocalWave.play());
        document.getElementById('vocal-pause-btn').addEventListener('click', () => splitVocalWave.pause());

        // ====================== AI混音逻辑 ======================
        const mixOriginalInput = document.getElementById('mix-original');
        const mixAccInput = document.getElementById('mix-acc');
        const mixVocalInput = document.getElementById('mix-vocal');
        const mixBtn = document.getElementById('mix-btn');
        const mixStatus = document.getElementById('mix-status');
        const mixResult = document.getElementById('mix-result');

        function checkMixFiles() {
            const original = mixOriginalInput.files[0];
            const acc = mixAccInput.files[0];
            const vocal = mixVocalInput.files[0];
            mixBtn.disabled = !(original && acc && vocal);
        }

        mixOriginalInput.addEventListener('change', (e) => {
            document.getElementById('mix-original-name').textContent = e.target.files[0] ? `已选择: ${e.target.files[0].name}` : '';
            checkMixFiles();
        });
        mixAccInput.addEventListener('change', (e) => {
            document.getElementById('mix-acc-name').textContent = e.target.files[0] ? `已选择: ${e.target.files[0].name}` : '';
            checkMixFiles();
        });
        mixVocalInput.addEventListener('change', (e) => {
            document.getElementById('mix-vocal-name').textContent = e.target.files[0] ? `已选择: ${e.target.files[0].name}` : '';
            checkMixFiles();
        });

        mixBtn.addEventListener('click', async () => {
            const original = mixOriginalInput.files[0];
            const acc = mixAccInput.files[0];
            const vocal = mixVocalInput.files[0];
            if (!original || !acc || !vocal) return;

            mixBtn.disabled = true;
            mixStatus.innerHTML = '<div class="status-tip status-info">正在AI混音中，请稍候（3-5分钟）...</div>';
            
            const formData = new FormData();
            formData.append('original_song', original);
            formData.append('user_acc', acc);
            formData.append('user_vocal', vocal);
            
            try {
                const res = await fetch('/api/mix', { method: 'POST', body: formData });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail);

                mixResultWave.load(`/api/download/${data.result_file}`);
                document.getElementById('result-download-btn').href = `/api/download/${data.result_file}`;
                mixResult.style.display = 'block';
                mixStatus.innerHTML = '<div class="status-tip status-success">✅ 混音完成！</div>';
            } catch (e) {
                mixStatus.innerHTML = `<div class="status-tip status-error">❌ 出错了：${e.message}</div>`;
            } finally {
                mixBtn.disabled = false;
            }
        });

        document.getElementById('result-play-btn').addEventListener('click', () => mixResultWave.play());
        document.getElementById('result-pause-btn').addEventListener('click', () => mixResultWave.pause());

        // ====================== 工程记录逻辑 ======================
        const projectsList = document.getElementById('projects-list');
        const refreshProjectsBtn = document.getElementById('refresh-projects-btn');

        async function loadProjects() {
            try {
                const res = await fetch('/api/projects');
                const data = await res.json();
                if (data.code !== 0) throw new Error("获取工程失败");

                projectsList.innerHTML = '';
                data.projects.forEach(project => {
                    const projectDiv = document.createElement('div');
                    projectDiv.className = 'project-item';
                    projectDiv.innerHTML = `
                        <div class="project-header">
                            <span class="project-type">${project.project_type}</span>
                            <span class="project-time">${project.create_time}</span>
                        </div>
                        <div class="project-files">
                            ${project.file_list.map(file => `<span style="color:#999;">${file}</span>`).join('')}
                        </div>
                    `;
                    projectsList.appendChild(projectDiv);
                });
            } catch (e) {
                projectsList.innerHTML = `<div class="status-tip status-error">❌ 获取工程失败：${e.message}</div>`;
            }
        }

        refreshProjectsBtn.addEventListener('click', loadProjects);
    </script>
</body>
</html>
